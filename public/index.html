<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architectural Plan Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Architectural Plan Generator</h1>
        
        <div class="form-group">
            <label for="prompt">Prompt</label>
            <input type="text" id="prompt" placeholder="e.g., Modern house with garden" required>
        </div>

        <div class="dimensions">
            <div class="form-group">
                <label for="width">Width</label>
                <input type="number" id="width" value="1024" required>
            </div>
            <div class="form-group">
                <label for="height">Height</label>
                <input type="number" id="height" value="1024" required>
            </div>
        </div>

        <button id="generateBtn">Generate Plan</button>

        <div id="resultContainer">
            <div id="costTracker" style="display: none; background: #e8f4fd; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9em; color: #005a9c;">
                <strong>Token Usage:</strong> <span id="tokenUsage">-</span> | 
                <strong>Estimated Cost:</strong> <span id="estimatedCost">$0.00</span>
            </div>
            <p id="statusMessage">Your generated plan will appear here.</p>
            <img id="generatedImage" style="display: none; max-width: 100%; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #ccc;" />
            
            <!-- 3D Model Generation Section -->
            <div id="threeDSection" style="display: none; margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px;">
                <button id="generate3DBtn" class="btn-3d">Generate 3D Model</button>
                <div id="threeDResults" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px;">
                    <!-- 3D images will be appended here -->
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
